
<!DOCTYPE html>
<html>

<head>

<title>Blood Request</title>

<link rel="stylesheet"
href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="form-container">

<h1>🩸 Blood Request</h1>

<form action="/add_request" method="POST">

<input
type="text"
name="patient_name"
placeholder="Patient Name"
required>

<select name="blood_group" required>

<option value="">Select Blood Group</option>

<option>A+</option>
<option>A-</option>
<option>B+</option>
<option>B-</option>
<option>AB+</option>
<option>AB-</option>
<option>O+</option>
<option>O-</option>

</select>

<input
type="number"
name="units"
placeholder="Required Units"
required>

<input
type="text"
name="hospital"
placeholder="Hospital Name"
required>

<button type="submit">
Submit Request
</button>

</form>

<br>

<a href="/view_requests">

<button type="button">

View Requests

</button>

</a>

</div>

</body>

</html>
