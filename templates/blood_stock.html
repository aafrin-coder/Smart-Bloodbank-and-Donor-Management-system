
<!DOCTYPE html>
<html>

<head>

<title>Blood Stock</title>

<link rel="stylesheet"
href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="table-container">

<h1>🩸 Blood Stock Management</h1>

<form action="/add_stock" method="POST">

<select name="blood_group" required>

<option value="">Select Blood Group</option>

<option>A+</option>
<option>A-</option>
<option>B+</option>
<option>B-</option>
<option>AB+</option>
<option>AB-</option>
<option>O+</option>
<option>O-</option>

</select>

<input
type="number"
name="units"
placeholder="Blood Units"
required>

<button type="submit">

Add Blood Stock

</button>

</form>

<br>

<table>

<tr>

<th>ID</th>

<th>Blood Group</th>

<th>Units</th>

</tr>

{% for row in stock %}

<tr>

<td>{{ row['stock_id'] }}</td>

<td>{{ row['blood_group'] }}</td>

<td>{{ row['units'] }}</td>

</tr>

{% endfor %}

</table>

<br>

<a href="/dashboard">

<button>

Back to Dashboard

</button>

</a>

</div>

</body>

</html>
