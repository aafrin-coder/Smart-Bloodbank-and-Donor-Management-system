
<!DOCTYPE html>
<html>

<head>

<title>Add Donor</title>

<link rel="stylesheet"
href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="form-container">

<h1>🩸 Donor Registration</h1>

<form action="/add_donor" method="POST">

<input
type="text"
name="donor_name"
placeholder="Donor Name"
required>

<input
type="number"
name="age"
placeholder="Age"
required>

<select name="gender" required>

<option value="">Select Gender</option>

<option>Male</option>

<option>Female</option>

<option>Other</option>

</select>

<select name="blood_group" required>

<option value="">Blood Group</option>

<option>A+</option>
<option>A-</option>
<option>B+</option>
<option>B-</option>
<option>AB+</option>
<option>AB-</option>
<option>O+</option>
<option>O-</option>

</select>

<input
type="text"
name="phone"
placeholder="Phone Number"
required>

<input
type="email"
name="email"
placeholder="Email Address">

<textarea
name="address"
placeholder="Address"></textarea>

<input
type="date"
name="last_donation">

<button type="submit">
    Save Donor
</button>

</form>

<br>

<a href="/view_donors">
    <button type="button">
        View Donors
    </button>
</a>

</div>

</body>
</html>
