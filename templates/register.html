<!DOCTYPE html>
<html>

<head>

    <title>Register</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="form-container">

<h1>Create Account</h1>

{% if error %}

<p style="color:red">

{{ error }}

</p>

{% endif %}

<form action="/register" method="POST">

<input
type="text"
name="username"
placeholder="Enter Username"
required>

<input
type="password"
name="password"
placeholder="Enter Password"
required>

<button type="submit">
Register
</button>

</form>

<br>

<p>

Already have an account?

<a href="/">Login Here</a>

</p>

</div>

</body>

</html>
