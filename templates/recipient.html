
<!DOCTYPE html>
<html>

<head>

<title>Recipient Registration</title>

<link rel="stylesheet"
href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="form-container">

<h1>🏥 Recipient Registration</h1>

<form action="/add_recipient" method="POST">

<input type="text"
name="recipient_name"
placeholder="Recipient Name"
required>

<input type="number"
name="age"
placeholder="Age"
required>

<select name="gender" required>

<option value="">Select Gender</option>

<option>Male</option>
<option>Female</option>
<option>Other</option>

</select>

<select name="blood_group" required>

<option value="">Blood Group</option>

<option>A+</option>
<option>A-</option>
<option>B+</option>
<option>B-</option>
<option>AB+</option>
<option>AB-</option>
<option>O+</option>
<option>O-</option>

</select>

<input type="text"
name="phone"
placeholder="Phone Number"
required>

<input type="text"
name="hospital"
placeholder="Hospital Name"
required>

<button type="submit">
Save Recipient
</button>

</form>

<br>

<a href="/view_recipients">

<button type="button">

View Recipients

</button>

</a>

</div>

</body>

</html>
